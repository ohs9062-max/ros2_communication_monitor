monitor:
  poll_interval_sec: 1.0
  stale_timeout_sec: 3.0
  hz_window_sec: 5.0

topics:
  auto_discover: true
  auto_subscribe_supported_types: true

  include_names: []

  exclude_names: []

  exclude_prefixes: []

  exclude_types:
    - rosgraph_msgs/msg/Clock
    - rcl_interfaces/msg/ParameterEvent
    - rcl_interfaces/msg/Log
    - tf2_msgs/msg/TFMessage

  supported_types:
    - sensor_msgs/msg/LaserScan
    - nav_msgs/msg/Odometry
    - sensor_msgs/msg/Imu
    - geometry_msgs/msg/Twist
    - geometry_msgs/msg/TwistStamped
    - sensor_msgs/msg/JointState
    - ros2_dashboard_interfaces/msg/MonitorStatus

services:
  include_names: []
  exclude_names: []
  exclude_prefixes: []

  active_check:
    # 정책 메모:
    # Service 상태는 ROS2 Graph의 Server 존재 여부로 관찰하고,
    # 실제 요청/응답 확인은 Interface Lab의 사용자 명시 Call로 수행합니다.
    # 일반 Service의 주기적 자동 호출은 상태 변경이나 장비 동작을
    # 유발할 수 있으므로 사용하지 않습니다.
    enabled: false
    interval_sec: 5.0
    default_timeout_sec: 2.0
    allowlist: []

nodes:
  include_names: []
  exclude_names: []
  exclude_prefixes: []
  stale_timeout_sec: 5.0

actions:
  include_names: []
  exclude_names: []
  exclude_prefixes: []
  auto_monitor_status: true
  auto_monitor_feedback: true
  auto_fetch_result_for_observed_goals: true
